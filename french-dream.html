<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>French Dream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f9f6f1;
      color: #2c2c2c;
    }

    header {
      background: #3b2f1e;
      color: #f9f6f1;
      text-align: center;
      padding: 48px 24px 40px;
    }

    header h1 {
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      font-weight: normal;
    }

    header p {
      margin-top: 12px;
      font-size: 1.05rem;
      color: #d4c4a8;
      font-style: italic;
    }

    .section {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .section + .section {
      border-top: 1px solid #ddd6cc;
    }

    .section h2 {
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 8px;
      color: #3b2f1e;
    }

    .section p {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-wrap {
      width: 100%;
      min-height: 620px;
    }

    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.8rem;
      color: #999;
      border-top: 1px solid #ddd6cc;
    }
  </style>
</head>
<body>

  <header>
    <h1>French Dream</h1>
    <p>Uw droomverblijf in Frankrijk</p>
  </header>

  <div class="section">
    <h2>Vraag onze brochure aan</h2>
    <p>Ontvang alle informatie over French Dream direct in uw mailbox.</p>
    <div class="form-wrap">
      <iframe
        src="https://api.leadconnectorhq.com/widget/form/aFXlG0bQlgQgtGqAEGaE"
        style="width:100%;height:611px;border:none;border-radius:8px"
        title="Recravas - Brochure - French Dream">
      </iframe>
    </div>
  </div>

  <div class="section">
    <h2>Plan een gesprek</h2>
    <p>Wilt u meer weten? We nemen graag de tijd voor een persoonlijk gesprek.</p>
    <div class="form-wrap">
      <iframe
        src="https://api.leadconnectorhq.com/widget/form/9S8b3B7tMQGvzyGiDTTq"
        style="width:100%;height:611px;border:none;border-radius:8px"
        title="Recravas - Gesprek - French Dream">
      </iframe>
    </div>
  </div>

  <footer>
    &copy; 2026 French Dream &mdash; Recravas
  </footer>

</body>
</html>
